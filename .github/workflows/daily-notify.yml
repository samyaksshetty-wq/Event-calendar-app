name: Send daily event notifications

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger today's notifications
        run: |
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "${{ secrets.BACKEND_URL }}/api/push/send-today" -H "x-notify-secret: ${{ secrets.NOTIFY_SECRET }}")
          echo "Response: $response"
          status=$(echo "$response" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$status" != "200" ]; then
            echo "Request failed with HTTP status $status"
            exit 1
          fi
